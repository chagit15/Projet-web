<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="Contact.css" />
        <title>Portfolio-Contact</title>
    </head>

    <body>     
        <nav>

            <input type="checkbox" id="nav-toggle">

            <div class="logo">
                <p>Portfolio de Charles </p>
            </div>
        
            <ul class="links">
                <li><a href="#">Accueil</a></li>
                <li><a href="#">À Propos</a></li>
                <li><a href="#">Biographie</a></li>
                <li><a href="#">Expertise</a></li>
                <li><a href="#">Projet</a></li>
                <li><a href="#" class="active">Contact</a></li>
            </ul>
           
            <label for="nav-toggle" class="icon-burger">
               <div class="line"></div>
               <div class="line"></div>
               <div class="line"></div>
            </label>

        </nav>

            <div id="title">

                <h1>Contact</h1>

            </div>

        <div id="container"> 
            
             <form>
                <table>
                
                    <tr>
                        <td class="section"><label for="nom">Nom:</label></td>
                        <td><input type="text" id="nom" name="nom" required></td>
                    </tr>

                     <tr>
                        <td class="section"><label for="pnom">Prenom:</label></td>
                        <td><input type="text" id="pnom" name="pnom" required></td>
                    </tr>

                     <tr>
                        <td class="section"><label for="email">Email:</label></td>
                        <td><input type="email" id="email" name="email" required></td>
                    </tr>

                     <tr>
                        <td class="section"><label for="message">Message:(optionel)</label></td>
                        <td><textarea id="message" name="message"></textarea></td>
                    </tr>

                     <tr>
                        <td colspan="2"><input type="submit" value="Envoyer" class="submit-btn"></td>
                    </tr>

                </table>
            </form>


        </div>
           
    

       <footer>
            <h3>&copy; Portfolio de Charles</h3>
       </footer>

    </body>
</html>
